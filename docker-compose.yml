services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contextpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contextpilot}
      POSTGRES_DB: ${POSTGRES_DB:-contextpilot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contextpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-contextpilot}:${POSTGRES_PASSWORD:-contextpilot}@postgres:5432/${POSTGRES_DB:-contextpilot}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Absolute paths so they match the shared volume mounts below regardless
      # of the container's working directory (backend/worker/beat all run
      # from /repo/backend, so the "./data/..." defaults would NOT be shared).
      VECTOR_STORE_DIR: /repo/data/vector_store
      UPLOAD_DIR: /repo/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - vector_store_data:/repo/data/vector_store
      - upload_data:/repo/data/uploads
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-contextpilot}:${POSTGRES_PASSWORD:-contextpilot}@postgres:5432/${POSTGRES_DB:-contextpilot}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      VECTOR_STORE_DIR: /repo/data/vector_store
      UPLOAD_DIR: /repo/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - vector_store_data:/repo/data/vector_store
      - upload_data:/repo/data/uploads
    command: celery -A app.celery_app worker --loglevel=info

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-contextpilot}:${POSTGRES_PASSWORD:-contextpilot}@postgres:5432/${POSTGRES_DB:-contextpilot}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      VECTOR_STORE_DIR: /repo/data/vector_store
      UPLOAD_DIR: /repo/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - vector_store_data:/repo/data/vector_store
      - upload_data:/repo/data/uploads
    command: celery -A app.celery_app beat --loglevel=info

  flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.celery_app flower --port=5555

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  vector_store_data:
  upload_data:
